<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="flameGold" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#B8922E"/>
      <stop offset="50%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#F0D48A"/>
    </linearGradient>
    <linearGradient id="flameInner" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#B8922E"/>
      <stop offset="100%" stop-color="#D4A853"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="40%">
      <stop offset="0%" stop-color="#D4A853" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="248" fill="#0F0D0A"/>
  <circle cx="256" cy="256" r="248" fill="url(#glow)"/>

  <!-- Subtle ring border -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#B8922E" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Grill grate lines (BBQ detail) -->
  <g stroke="#B8922E" stroke-width="5" stroke-linecap="round" stroke-opacity="0.5">
    <line x1="176" y1="340" x2="336" y2="340"/>
    <line x1="170" y1="358" x2="342" y2="358"/>
    <line x1="176" y1="376" x2="336" y2="376"/>
  </g>

  <!-- Main flame - outer -->
  <path d="
    M 256 120
    C 256 120, 310 180, 320 230
    C 330 280, 322 310, 308 330
    C 294 350, 276 340, 280 310
    C 284 280, 300 260, 290 230
    C 280 200, 256 190, 256 190
    C 256 190, 232 200, 222 230
    C 212 260, 228 280, 232 310
    C 236 340, 218 350, 204 330
    C 190 310, 182 280, 192 230
    C 202 180, 256 120, 256 120
    Z
  " fill="url(#flameGold)"/>

  <!-- Inner flame detail -->
  <path d="
    M 256 175
    C 256 175, 288 220, 292 255
    C 296 290, 282 315, 272 322
    C 262 329, 256 310, 256 295
    C 256 310, 250 329, 240 322
    C 230 315, 216 290, 220 255
    C 224 220, 256 175, 256 175
    Z
  " fill="url(#flameInner)" opacity="0.6"/>

  <!-- Bright core -->
  <path d="
    M 256 230
    C 256 230, 274 260, 272 285
    C 270 305, 260 315, 256 315
    C 252 315, 242 305, 240 285
    C 238 260, 256 230, 256 230
    Z
  " fill="#F0D48A" opacity="0.5"/>
</svg>